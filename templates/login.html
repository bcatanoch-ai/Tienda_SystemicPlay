<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">   
</head>
<body>

    <header>
        <div class="logo">
            <a href="{{ url_for('home') }}">Systemic Play</a>
        </div>
        <div class="busqueda">
            <input type="text" placeholder="Buscar...">
        </div>
        <div class="opciones">
            <a href="{{ url_for('login') }}">Iniciar Sesión</a>
            <a href="{{ url_for('carrito') }}" class="option">Carrito</a>
        </div>
    </header>

    
    <nav class="sub_menu">
        <ul>
            <li class="dropdown">
                <a href="{{ url_for('consola') }}" class="dropbtn">Consolas</a>
                <ul class="dropdown-content">
                    <li><a href="{{ url_for('PS5') }}">PlayStation 5</a></li>
                    <li><a href="{{ url_for('PS4') }}">PlayStation 4</a></li>
                    <li><a href="{{ url_for('XBOX') }}">XBOX</a></li>
                    <li><a href="{{ url_for('NintendoSwitch') }}">Nintendo Switch</a></li>
                    <li><a href="{{ url_for('PC') }}">PC</a></li>
                </ul>
            </li>
            
            <li><a href="{{ url_for('accesorios') }}">Accesorios</a></li>
            <li><a href="{{ url_for('coleccionables') }}">Coleccionables</a></li>
            <li><a href="{{ url_for('lanzamientos') }}">Próximos Lanzamientos</a></li>
        </ul>
    </nav>

    <main class="contenedor-login">
        <div class="caja-login">
            <h1>Inicio de Sesión</h1>
            <p>Inicie sesión con su correo electrónico.</p>
            
            <form action="#">
                <div class="grupo-input">
                    <label for="email">Correo electrónico *</label>
                    <input type="email" id="email" required>
                </div>

                <div class="grupo-input">
                    <label for="password">Contraseña *</label>
                    <input type="password" id="password" required>
                </div>

                <a href="#" class="olvido-pass">¿Olvidó su contraseña?</a>

                <button type="submit" id="btn_entrar" class="btn-principal">INICIAR SESIÓN</button>
                <button type="button" id="btn_registrar" class="btn-secundario">CREAR UNA CUENTA</button>
            </form>
            
            <p class="nota">* Campos obligatorios</p>
        </div>
    </main>
    <script src="{{ url_for('static', filename='js/script.js') }}?v=1.0"></script>
</body>
</html>
